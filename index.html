<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="etch.css"  href="let cells = document.querySelectorAll('.cell')">
    <title>Etch-A-Sketch</title>
</head>
<body>
    <header>
        <h1>Etch-A-Sketch</h1>
    </header>
    <div id="outer-of-outer">
        <div id="outermost-wrapper">
            <div id="outer-wrap-buttons">
                <div id="btn-container">
                    
                    <input type="color" value="#708090" id="color-picker" class="targetButtons">
                    
                    <button class="targetButtons" id="color" onclick="colorMode()">Color mode</button>
                    <button class="targetButtons" id="rainbow" onclick="rainbowMode()">Rainbow mode</button>
                    <button class="targetButtons" id="erase" onclick="eraseMode()">Eraser</button>
                    <button class="targetButtons" id="clear" onclick="clearMode()">Clear</button>


                    <div class="slider-container">
                        <p id="rangeValue"></p>
                        <input type="range" min="16" max="30" value="16" class="slider" id="custom-range">
                    </div>
                    
                    
                
                </div>

            </div>

            <div id="grid-container"></div>

        </div>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
